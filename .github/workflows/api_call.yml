name: run discord bot with token
on:
  push:
    branches: [ main ]

jobs:
  call-api:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      # Step 1: Download your code from GitHub into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install required Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py

      # Step 3: Run your actual bot script
      - name: Run bot
        env:
          DISCORD_BOT: ${{ secrets.DISCORD_BOT }}
        run: python bot.py
